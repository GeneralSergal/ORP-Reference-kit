name: ORP CTS-2.7 Compliance Check

on:
  push:
    branches: ["main", "release/*"]
  pull_request:
    branches: ["main"]

jobs:
  cts:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run CTS-2.7 Test Suite
        run: |
          pytest -q --disable-warnings --maxfail=1

      - name: Verify package import
        run: |
          python -c "from orp_v2_7.runtime import ORPRuntime; print('IMPORT OK')"

      - name: Final Tribunal Verdict
        run: |
          echo "CTS-2.7 VALIDATION COMPLETE"
