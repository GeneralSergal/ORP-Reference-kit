name: ORP CTS-2.7 Compliance Check

on:
  push:
    branches: ["main", "release/*"]
  pull_request:
    branches: ["main"]

jobs:
  cts-validation:
    name: CTS-2.7 Tribunal Validation
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run CTS-2.7 Compliance Suite
        run: |
          pytest -q --disable-warnings --maxfail=1

      - name: Verify Core Import Stability
        run: |
          python -c "from orp_v2_7.runtime import ORPRuntime; print('IMPORT OK')"

      - name: Final Tribunal Verdict (SUCCESS)
        if: success()
        run: |
          echo "CTS-2.7 VALIDATION COMPLETE"

      - name: Final Tribunal Verdict (FAILURE)
        if: failure()
        run: |
          echo "CTS-2.7 VALIDATION FAILED"
          exit 1
