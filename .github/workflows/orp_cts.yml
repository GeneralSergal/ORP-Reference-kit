name: ORP CTS-2.7 Compliance Check

on:
  push:
    branches: ["main", "release/*"]
  pull_request:
    branches: ["main"]

jobs:
  cts-validation:
    name: CTS-2.7 Tribunal Validation
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run CTS-2.7 Compliance Suite
        run: |
          PYTHONPATH=$PWD/src:$PWD pytest -q --disable-warnings --maxfail=1

      - name: Verify Invariant Enforcement (I1–I5)
        run: |
          python -c "
import sys
try:
    from cts.cts_harness import CTS2_7
    print('CTS module loaded OK')
except Exception as e:
    print('CTS load failure:', e)
    sys.exit(1)
print('Invariant layer import check passed')
"

      - name: Golden Run Verification (E-01)
        run: |
          if [ -d "golden" ]; then
            echo "Golden trace directory detected."
          else
            echo "ERROR: Missing golden/ canonical oracle."
            exit 1
          fi

      - name: Final Tribunal Verdict
        run: |
          echo "CTS-2.7 VALIDATION COMPLETE"
